<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Idébank</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --canvas:#E9ECE5; --surface:#FBFCF9; --ink:#22281F; --muted:#737B6E;
    --line:#DCE0D5; --accent:#CC882B; --accent-bright:#E8A53D;
    --forest:#42634A; --radius:18px;
    --shadow:0 1px 2px rgba(34,40,31,.04), 0 6px 20px rgba(34,40,31,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{background:#cfd4ca;font-family:'Inter',system-ui,sans-serif;color:var(--ink);
    display:flex;justify-content:center;min-height:100vh;}
  .phone{width:100%;max-width:430px;min-height:100vh;background:var(--canvas);
    position:relative;display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,0,0,.12);}
  .scroll{flex:1;overflow-y:auto;padding:32px 20px 150px;}

  /* header */
  .top{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;}
  .title{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:30px;
    letter-spacing:-.02em;margin:0;line-height:1;}
  .sub{font-size:13.5px;color:var(--muted);margin:8px 0 0;font-weight:500;}
  .searchbtn{flex:0 0 auto;width:42px;height:42px;border-radius:13px;border:1px solid var(--line);
    background:var(--surface);color:var(--muted);display:grid;place-items:center;cursor:pointer;}
  .searchbtn svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none;}
  .searchbtn.on{background:var(--forest);color:#fff;border-color:var(--forest);}

  .searchwrap{overflow:hidden;max-height:0;transition:max-height .28s ease,margin .28s ease;margin-top:0;}
  .searchwrap.open{max-height:64px;margin-top:14px;}
  .searchwrap input{width:100%;border:1px solid var(--line);background:var(--surface);
    border-radius:13px;padding:12px 14px;font-family:inherit;font-size:15px;color:var(--ink);outline:0;}
  .searchwrap input::placeholder{color:#9aa394;}

  /* filter chips */
  .filters{display:flex;gap:8px;overflow-x:auto;margin:18px -20px 4px;padding:2px 20px 6px;
    scrollbar-width:none;}
  .filters::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto;border:1px solid var(--line);background:var(--surface);color:var(--muted);
    font-family:inherit;font-size:13.5px;font-weight:600;padding:8px 14px;border-radius:99px;
    cursor:pointer;white-space:nowrap;transition:.15s;}
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .chip.star.active{background:var(--accent);border-color:var(--accent);}

  /* idea card */
  .idea{background:var(--surface);border-radius:var(--radius);padding:15px 16px;margin-top:11px;
    box-shadow:var(--shadow);border:1px solid transparent;
    animation:rise .4s cubic-bezier(.2,.8,.2,1) both;cursor:pointer;}
  .idea.leaving{animation:leave .34s ease forwards;}
  @keyframes rise{from{opacity:0;transform:translateY(9px);}to{opacity:1;transform:none;}}
  @keyframes leave{to{opacity:0;transform:translateX(40px);max-height:0;margin:0;padding:0 16px;}}
  .idea-row{display:flex;align-items:flex-start;gap:12px;}
  .idea-body{flex:1;min-width:0;}
  .idea-text{font-size:16px;line-height:1.4;font-weight:500;word-break:break-word;white-space:pre-wrap;}
  .idea-meta{display:flex;align-items:center;gap:9px;margin-top:9px;}
  .pill{font-size:11.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
    color:var(--muted);background:#EEF0EA;border-radius:7px;padding:3px 8px;cursor:pointer;}
  .pill.ny{color:#A98A52;background:#F7F0E2;}
  .date{font-size:12px;color:#9aa394;font-weight:500;}
  .fav{flex:0 0 auto;width:34px;height:34px;border:0;background:none;cursor:pointer;
    display:grid;place-items:center;color:#C3CABA;border-radius:50%;margin:-4px -6px 0 0;}
  .fav.on{color:var(--accent);}
  .fav:active{transform:scale(.85);}
  .fav svg{width:20px;height:20px;}

  /* expanded edit area */
  .expand{max-height:0;overflow:hidden;transition:max-height .3s ease;}
  .idea.open .expand{max-height:420px;}
  .edit-ta,.note-ta{width:100%;border:1px solid var(--line);background:#fff;border-radius:12px;
    font-family:inherit;font-size:15px;color:var(--ink);padding:11px 12px;outline:0;resize:none;
    margin-top:12px;line-height:1.4;}
  .edit-ta:focus,.note-ta:focus{border-color:var(--forest);}
  .catrow{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px;}
  .catpick{border:1px solid var(--line);background:#fff;color:var(--muted);font-family:inherit;
    font-size:13px;font-weight:600;padding:7px 12px;border-radius:99px;cursor:pointer;}
  .catpick.sel{background:var(--forest);color:#fff;border-color:var(--forest);}
  .exfoot{display:flex;justify-content:flex-end;margin-top:12px;}
  .del{border:1px solid var(--line);background:#fff;color:#B4574A;font-family:inherit;
    font-size:13.5px;font-weight:600;padding:9px 14px;border-radius:11px;cursor:pointer;}
  .del:active{transform:scale(.95);}

  /* empty state */
  .empty{text-align:center;padding:54px 20px 20px;color:var(--muted);}
  .empty .glyph{font-size:34px;margin-bottom:10px;}
  .empty .em-ttl{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:20px;
    color:var(--ink);margin:0 0 8px;}
  .empty p{margin:0 auto;font-size:14.5px;line-height:1.55;max-width:280px;}

  /* capture bar */
  .capture{position:absolute;left:0;right:0;bottom:0;
    padding:14px 16px calc(16px + env(safe-area-inset-bottom));
    background:linear-gradient(to top,var(--canvas) 72%,rgba(233,236,229,0));}
  .capfield{display:flex;align-items:flex-end;gap:10px;background:#fff;border-radius:18px;
    padding:8px 8px 8px 16px;box-shadow:0 4px 24px rgba(34,40,31,.15);border:1px solid var(--line);}
  .capfield textarea{flex:1;border:0;outline:0;font-family:inherit;font-size:16px;color:var(--ink);
    background:none;resize:none;padding:9px 0;line-height:1.35;max-height:120px;}
  .capfield textarea::placeholder{color:#9aa394;}
  .savebtn{flex:0 0 auto;width:44px;height:44px;border:0;border-radius:13px;cursor:pointer;
    background:var(--accent);color:#fff;display:grid;place-items:center;transition:transform .12s,background .2s;}
  .savebtn:active{transform:scale(.9);}
  .savebtn:disabled{background:#cdd2c7;}
  .savebtn svg{width:23px;height:23px;stroke:#fff;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round;}

  .spark{position:fixed;width:7px;height:7px;border-radius:50%;pointer-events:none;z-index:50;}
  .savednote{font-size:11px;color:var(--muted);text-align:center;margin-top:8px;}
  :focus-visible{outline:2.5px solid var(--forest);outline-offset:2px;}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<div class="phone">
  <div class="scroll" id="scroll">
    <div class="top">
      <div>
        <h1 class="title">Idébank</h1>
        <p class="sub" id="sub">Laster…</p>
      </div>
      <button class="searchbtn" id="searchBtn" aria-label="Søk">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
      </button>
    </div>
    <div class="searchwrap" id="searchWrap">
      <input id="search" type="text" placeholder="Søk i ideene dine…" autocomplete="off" />
    </div>
    <div class="filters" id="filters"></div>
    <div id="list"></div>
    <div class="savednote" id="savedNote"></div>
  </div>

  <div class="capture">
    <div class="capfield">
      <textarea id="cap" rows="1" placeholder="Hva er ideen?" enterkeyhint="enter"></textarea>
      <button class="savebtn" id="saveBtn" disabled aria-label="Lagre idé">
        <svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
(function(){
  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const CATS = [
    {k:"ny",label:"Ny"},{k:"app",label:"App"},{k:"spill",label:"Spill"},
    {k:"business",label:"Business"},{k:"innhold",label:"Innhold"},{k:"annet",label:"Annet"}
  ];
  const catLabel = k => (CATS.find(c=>c.k===k)||CATS[0]).label;

  /* ---------- persistence (window.storage → localStorage → memory) ---------- */
  let mem = [], memoryOnly = false;
  const KEY = "ideabank:v1";
  const Store = {
    async load(){
      if(window.storage && window.storage.get){
        try{ const r = await window.storage.get(KEY); return r&&r.value ? JSON.parse(r.value) : []; }
        catch(e){ return []; }
      }
      if(window.localStorage){
        try{ const v = localStorage.getItem(KEY); return v ? JSON.parse(v) : []; }catch(e){ return []; }
      }
      memoryOnly = true; return mem;
    },
    async save(arr){
      if(window.storage && window.storage.set){
        try{ await window.storage.set(KEY, JSON.stringify(arr)); return; }catch(e){}
      }
      if(window.localStorage){
        try{ localStorage.setItem(KEY, JSON.stringify(arr)); return; }catch(e){}
      }
      memoryOnly = true; mem = arr;
    }
  };

  let ideas = [];
  let filter = "all";
  let query = "";
  let openId = null;

  const $ = s => document.querySelector(s);
  const list = $("#list");

  /* ---------- render ---------- */
  function render(){
    $("#sub").textContent = ideas.length===0 ? "Tom — og venter på den første."
      : ideas.length + (ideas.length===1 ? " idé fanget" : " ideer fanget");
    $("#savedNote").textContent = memoryOnly ? "Lagres kun denne økten (åpne i appen for å huske)." : "";

    renderFilters();

    let view = ideas.slice();
    if(filter==="fav") view = view.filter(i=>i.fav);
    else if(filter!=="all") view = view.filter(i=>i.cat===filter);
    if(query) view = view.filter(i=>(i.text+" "+(i.note||"")).toLowerCase().includes(query));
    view.sort((a,b)=>b.created-a.created);

    list.innerHTML = "";
    if(view.length===0){ list.appendChild(emptyState()); return; }
    view.forEach(i=>list.appendChild(ideaEl(i)));
  }

  function renderFilters(){
    const wrap = $("#filters"); wrap.innerHTML="";
    const used = new Set(ideas.map(i=>i.cat));
    const base = [{k:"all",label:"Alle"},{k:"fav",label:"★ Favoritter",star:true}];
    const cats = CATS.filter(c=>used.has(c.k));
    [...base,...cats].forEach(f=>{
      const c = document.createElement("button");
      c.className = "chip"+(filter===f.k?" active":"")+(f.star?" star":"");
      c.textContent = f.label;
      c.onclick = ()=>{ filter=f.k; render(); };
      wrap.appendChild(c);
    });
  }

  function emptyState(){
    const noneYet = ideas.length===0;
    return el(`<div class="empty">
      <div class="glyph">💡</div>
      <p class="em-ttl">${noneYet?"Ingen ideer enda":"Ingenting her"}</p>
      <p>${noneYet
        ? "Neste gang noe kult slår deg — en app, et spill, en greie — dump det i feltet nederst. Sorter senere."
        : "Ingen ideer i dette filteret. Prøv «Alle»."}</p>
    </div>`);
  }

  function ideaEl(i){
    const node = el(`<div class="idea ${openId===i.id?'open':''}"></div>`);

    const row = el(`<div class="idea-row"></div>`);
    const body = el(`<div class="idea-body"></div>`);
    body.appendChild(el(`<div class="idea-text">${escapeHtml(i.text)}</div>`));
    const meta = el(`<div class="idea-meta"></div>`);
    const pill = el(`<span class="pill ${i.cat==='ny'?'ny':''}">${catLabel(i.cat)}</span>`);
    pill.onclick = (e)=>{ e.stopPropagation(); cycleCat(i); };
    meta.appendChild(pill);
    meta.appendChild(el(`<span class="date">${fmtDate(i.created)}</span>`));
    body.appendChild(meta);
    row.appendChild(body);

    const fav = el(`<button class="fav ${i.fav?'on':''}" aria-label="Favoritt">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3.6l2.5 5.2 5.7.8-4.1 4 1 5.6L12 16.7 6.9 19.2l1-5.6-4.1-4 5.7-.8z"/></svg></button>`);
    fav.onclick = (e)=>{ e.stopPropagation(); i.fav=!i.fav; persist(); render(); };
    row.appendChild(fav);
    node.appendChild(row);

    // expand
    const ex = el(`<div class="expand"></div>`);
    const ta = el(`<textarea class="edit-ta" rows="2">${escapeHtml(i.text)}</textarea>`);
    ta.oninput = ()=>{ i.text=ta.value; autoGrow(ta); persistSoft(); };
    ta.onclick = e=>e.stopPropagation();
    ex.appendChild(ta);
    const note = el(`<textarea class="note-ta" rows="1" placeholder="Legg til detaljer (valgfritt)…">${escapeHtml(i.note||"")}</textarea>`);
    note.oninput = ()=>{ i.note=note.value; autoGrow(note); persistSoft(); };
    note.onclick = e=>e.stopPropagation();
    ex.appendChild(note);
    const catrow = el(`<div class="catrow"></div>`);
    CATS.forEach(c=>{
      const b = el(`<button class="catpick ${i.cat===c.k?'sel':''}">${c.label}</button>`);
      b.onclick = (e)=>{ e.stopPropagation(); i.cat=c.k; persist(); render(); };
      catrow.appendChild(b);
    });
    ex.appendChild(catrow);
    const foot = el(`<div class="exfoot"></div>`);
    const del = el(`<button class="del">Slett idé</button>`);
    del.onclick = (e)=>{ e.stopPropagation(); node.classList.add("leaving");
      setTimeout(()=>{ ideas=ideas.filter(x=>x.id!==i.id); persist(); render(); }, reduce?0:320); };
    foot.appendChild(del);
    ex.appendChild(foot);
    node.appendChild(ex);

    node.onclick = ()=>{ openId = openId===i.id ? null : i.id; render();
      if(openId===i.id) setTimeout(()=>{ const t=node.querySelector('.edit-ta'); if(t) autoGrow(t); },30); };
    return node;
  }

  function cycleCat(i){
    const idx = CATS.findIndex(c=>c.k===i.cat);
    i.cat = CATS[(idx+1)%CATS.length].k;
    persist(); render();
  }

  /* ---------- capture ---------- */
  const cap = $("#cap"), saveBtn = $("#saveBtn");
  cap.addEventListener("input", ()=>{ autoGrow(cap); saveBtn.disabled = cap.value.trim()===""; });
  saveBtn.onclick = addIdea;
  cap.addEventListener("keydown", e=>{ if((e.metaKey||e.ctrlKey)&&e.key==="Enter") addIdea(); });

  function addIdea(){
    const text = cap.value.trim(); if(!text) return;
    ideas.push({id:Date.now()+""+Math.floor(Math.random()*99), text, cat:"ny", fav:false, note:"", created:Date.now()});
    cap.value=""; autoGrow(cap); saveBtn.disabled=true;
    if(navigator.vibrate) navigator.vibrate([12,28,12]);
    burst(saveBtn);
    filter="all"; query=""; $("#search").value=""; $("#searchWrap").classList.remove("open"); $("#searchBtn").classList.remove("on");
    persist(); render();
    requestAnimationFrame(()=>$("#scroll").scrollTo({top:0,behavior:"smooth"}));
  }

  /* ---------- search ---------- */
  $("#searchBtn").onclick = ()=>{
    const w = $("#searchWrap"), btn=$("#searchBtn");
    const open = w.classList.toggle("open"); btn.classList.toggle("on",open);
    if(open) setTimeout(()=>$("#search").focus(),100);
    else { query=""; $("#search").value=""; render(); }
  };
  $("#search").addEventListener("input", e=>{ query=e.target.value.trim().toLowerCase(); render(); });

  /* ---------- persist ---------- */
  let softTimer;
  function persist(){ Store.save(ideas); }
  function persistSoft(){ clearTimeout(softTimer); softTimer=setTimeout(()=>Store.save(ideas),400); }

  /* ---------- fx & helpers ---------- */
  function burst(node){
    if(reduce) return;
    const r=node.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+r.height/2;
    const colors=["#E8A53D","#CC882B","#42634A","#E8A53D"];
    for(let i=0;i<9;i++){
      const s=document.createElement("div"); s.className="spark";
      s.style.background=colors[i%colors.length]; s.style.left=cx+"px"; s.style.top=cy+"px";
      document.body.appendChild(s);
      const a=(Math.PI*2)*(i/9)+Math.random()*.5, d=32+Math.random()*26;
      s.animate([{transform:"translate(-50%,-50%) scale(1)",opacity:1},
        {transform:`translate(calc(-50% + ${Math.cos(a)*d}px), calc(-50% + ${Math.sin(a)*d}px)) scale(0)`,opacity:0}],
        {duration:520+Math.random()*160,easing:"cubic-bezier(.2,.7,.2,1)"}).onfinish=()=>s.remove();
    }
  }
  function autoGrow(t){ t.style.height="auto"; t.style.height=Math.min(t.scrollHeight,t===cap?120:300)+"px"; }
  function fmtDate(ts){
    const d=new Date(ts), now=new Date();
    const sameDay = d.toDateString()===now.toDateString();
    const yest = new Date(now); yest.setDate(now.getDate()-1);
    if(sameDay) return "i dag";
    if(d.toDateString()===yest.toDateString()) return "i går";
    return new Intl.DateTimeFormat("nb-NO",{day:"numeric",month:"short"}).format(d);
  }
  function el(html){ const d=document.createElement("div"); d.innerHTML=html.trim(); return d.firstChild; }
  function escapeHtml(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

  /* ---------- boot ---------- */
  (async()=>{ ideas = await Store.load(); render(); })();
})();
</script>
</body>
</html>
